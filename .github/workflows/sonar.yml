name: SonarCloud
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: bw-output 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # The new official sub-action to install the build wrapper
      - name: Install build-wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v4
        
      - name: Create build directory
        run: mkdir -p build
        
      - name: Run build-wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} gcc -Wall -Wextra src/main.c -o build/microcontrol

      # The new unified official scan action
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}